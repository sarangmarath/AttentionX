<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AttentionX - Video Repurposing Engine</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0f0f0f;
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        h1 {
            font-size: 2.5rem;
            background: linear-gradient(90deg, #a855f7, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }
        p.subtitle {
            color: #888;
            margin-bottom: 40px;
            font-size: 1rem;
        }
        .card {
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 560px;
            text-align: center;
        }
        .upload-area {
            border: 2px dashed #a855f7;
            border-radius: 12px;
            padding: 40px 20px;
            cursor: pointer;
            margin-bottom: 20px;
            transition: 0.3s;
        }
        .upload-area:hover { background: #2a1a3a; }
        .upload-area p { color: #888; font-size: 0.9rem; margin-top: 8px; }
        .upload-icon { font-size: 2.5rem; }
        input[type="file"] { display: none; }

        /* Slider */
        .slider-container {
            margin-bottom: 24px;
            text-align: left;
        }
        .slider-container label {
            font-size: 0.9rem;
            color: #ccc;
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
        }
        .slider-container span {
            color: #a855f7;
            font-weight: 600;
        }
        input[type="range"] {
            width: 100%;
            accent-color: #a855f7;
            cursor: pointer;
        }

        button {
            background: linear-gradient(90deg, #a855f7, #ec4899);
            color: white;
            border: none;
            padding: 14px 40px;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            width: 100%;
            font-weight: 600;
            transition: 0.3s;
        }
        button:hover { opacity: 0.85; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .status {
            margin-top: 20px;
            color: #a855f7;
            font-size: 0.9rem;
            min-height: 24px;
        }

        /* Clips */
        .clips {
            margin-top: 24px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .clip-card {
            background: #111;
            border: 1px solid #2a2a2a;
            border-radius: 12px;
            padding: 16px;
            text-align: left;
        }
        .clip-card h3 {
            font-size: 0.95rem;
            color: #a855f7;
            margin-bottom: 10px;
        }
        .clip-card video {
            width: 100%;
            border-radius: 8px;
            margin-bottom: 10px;
            max-height: 300px;
            background: #000;
        }
        .clip-btn {
            background: #2a2a2a;
            color: #a855f7;
            border: 1px solid #a855f7;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.85rem;
            text-decoration: none;
            display: block;
            text-align: center;
            transition: 0.3s;
        }
        .clip-btn:hover { background: #3a1a5a; }
        #filename { color: #a855f7; margin-top: 8px; font-size: 0.85rem; margin-bottom: 16px; }
    </style>
</head>
<body>
    <h1>⚡ AttentionX</h1>
    <p class="subtitle">Turn long videos into viral short clips instantly</p>
    
    <div class="card">
        <div class="upload-area" onclick="document.getElementById('videoInput').click()">
            <div class="upload-icon">🎬</div>
            <p>Click to upload your video</p>
            <p>MP4, MOV, AVI supported</p>
        </div>
        <div id="filename"></div>

        <input type="file" id="videoInput" accept="video/*" onchange="handleFile(this)">

        <!-- Clip Duration Slider -->
        <div class="slider-container">
            <label>
                Clip Duration
                <span id="durationVal">60s</span>
            </label>
            <input type="range" id="durationSlider" min="15" max="120" value="60" step="5"
                oninput="document.getElementById('durationVal').textContent = this.value + 's'">
        </div>

        <button id="processBtn" onclick="processVideo()" disabled>Generate Clips </button>
        <div class="status" id="status"></div>
        <div class="clips" id="clips"></div>
    </div>

    <script>
        let selectedFile = null;

        function handleFile(input) {
            selectedFile = input.files[0];
            document.getElementById('filename').textContent = '📁 ' + selectedFile.name;
            document.getElementById('processBtn').disabled = false;
        }

        async function processVideo() {
            if (!selectedFile) return;

            const btn = document.getElementById('processBtn');
            const status = document.getElementById('status');
            const clipsDiv = document.getElementById('clips');
            const duration = document.getElementById('durationSlider').value;

            btn.disabled = true;
            clipsDiv.innerHTML = '';
            status.textContent = 'Uploading and analyzing video...';

            const formData = new FormData();
            formData.append('video', selectedFile);
            formData.append('duration', duration);

            try {
                const response = await fetch('/process', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (data.error) {
                    status.textContent = 'Error: ' + data.error;
                } else {
                    status.textContent = 'Done! Your clips are ready:';
                    data.clips.forEach((clip, i) => {
                        const card = document.createElement('div');
                        card.className = 'clip-card';

                        const title = document.createElement('h3');
                        title.textContent = `⚡ ${clip.label}`;

                        const video = document.createElement('video');
                        video.src = clip.preview;
                        video.controls = true;

                        const a = document.createElement('a');
                        a.href = clip.download;
                        a.className = 'clip-btn';
                        a.textContent = `⬇Download ${clip.label}`;
                        a.download = true;

                        card.appendChild(title);
                        card.appendChild(video);
                        card.appendChild(a);
                        clipsDiv.appendChild(card);
                    });
                }
            } catch (err) {
                status.textContent = 'Something went wrong!';
            }

            btn.disabled = false;
        }
    </script>
</body>
</html>
